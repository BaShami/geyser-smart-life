<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1350" />
    <title>Conversation Lights</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1080px;
        height: 1350px;
        overflow: hidden;
        background: #1a222c;
      }
      body {
        font-family: "Figtree", system-ui, sans-serif;
      }

      #root {
        position: relative;
        width: 1080px;
        height: 1350px;
        overflow: hidden;
      }

      .scene {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }

      /* Cool soft room — blues / creams / soft neutrals */
      .room-fill {
        position: absolute;
        inset: 0;
        background:
          linear-gradient(165deg, #c5d0dc 0%, #d8e0ea 38%, #e6ebf1 72%, #d0d8e2 100%);
      }

      .wall-texture {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(ellipse 90% 55% at 50% 0%, rgba(255, 255, 255, 0.35), transparent 60%),
          radial-gradient(ellipse 70% 50% at 80% 70%, rgba(160, 180, 200, 0.25), transparent 55%);
        opacity: 0.9;
      }

      .floor {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 38%;
        background: linear-gradient(180deg, #b8c3d0 0%, #9eacbc 55%, #8e9aab 100%);
        clip-path: polygon(0 18%, 100% 0, 100% 100%, 0 100%);
      }

      .floor-sheen {
        position: absolute;
        left: 8%;
        right: 8%;
        bottom: 8%;
        height: 18%;
        background: radial-gradient(ellipse at 50% 50%, rgba(255, 255, 255, 0.22), transparent 70%);
        filter: blur(8px);
        opacity: 0.35;
      }

      .window {
        position: absolute;
        top: 9%;
        left: 10%;
        width: 280px;
        height: 340px;
        border-radius: 18px;
        background: linear-gradient(180deg, #a8b8c8 0%, #c2ceda 45%, #d5dde6 100%);
        box-shadow:
          inset 0 0 0 10px #e8eef4,
          inset 0 0 40px rgba(90, 110, 130, 0.18),
          0 18px 40px rgba(40, 55, 75, 0.12);
        overflow: hidden;
      }

      .window-pane {
        position: absolute;
        inset: 18px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        gap: 8px;
      }

      .window-pane span {
        display: block;
        background: linear-gradient(160deg, #dfe7ef, #b7c6d4);
        border-radius: 4px;
      }

      .curtain {
        position: absolute;
        top: 7%;
        width: 52px;
        height: 380px;
        background: linear-gradient(90deg, #d5dde6, #e8eef3);
        opacity: 0.85;
      }
      .curtain-l {
        left: 8%;
        border-radius: 8px 0 0 8px;
      }
      .curtain-r {
        left: calc(10% + 228px);
        border-radius: 0 8px 8px 0;
      }

      /* Floor lamp */
      .lamp {
        position: absolute;
        right: 14%;
        bottom: 22%;
        width: 220px;
        height: 520px;
        z-index: 3;
      }

      .lamp-shade {
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 168px;
        height: 110px;
        background: linear-gradient(180deg, #eef2f6 0%, #c8d2de 100%);
        clip-path: polygon(18% 0, 82% 0, 100% 100%, 0 100%);
        border-radius: 2px;
        z-index: 2;
      }

      .lamp-shade-lit {
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 168px;
        height: 110px;
        background: linear-gradient(180deg, #fff8ec 0%, #f0e2c4 100%);
        clip-path: polygon(18% 0, 82% 0, 100% 100%, 0 100%);
        border-radius: 2px;
        z-index: 3;
        opacity: 0;
      }

      .lamp-shade-inner {
        position: absolute;
        top: 18px;
        left: 50%;
        transform: translateX(-50%);
        width: 120px;
        height: 70px;
        background: #f4f1ea;
        clip-path: polygon(12% 0, 88% 0, 100% 100%, 0 100%);
        opacity: 0.35;
        z-index: 1;
      }

      .lamp-stem {
        position: absolute;
        top: 100px;
        left: 50%;
        transform: translateX(-50%);
        width: 10px;
        height: 340px;
        background: linear-gradient(90deg, #7a8796, #a0acb8 45%, #6e7b8a);
        border-radius: 4px;
      }

      .lamp-base {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 120px;
        height: 18px;
        background: linear-gradient(180deg, #8a97a6, #6b7888);
        border-radius: 50%;
        box-shadow: 0 8px 16px rgba(40, 55, 70, 0.25);
      }

      .lamp-glow {
        position: absolute;
        top: 40px;
        left: 50%;
        transform: translateX(-50%);
        width: 520px;
        height: 520px;
        background: radial-gradient(
          circle,
          rgba(255, 244, 220, 0.85) 0%,
          rgba(255, 236, 200, 0.4) 30%,
          rgba(255, 230, 190, 0.14) 52%,
          transparent 70%
        );
        filter: blur(6px);
        opacity: 0;
        pointer-events: none;
        z-index: 0;
      }

      .room-light {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(ellipse 75% 60% at 72% 40%, rgba(255, 242, 220, 0.7), transparent 58%),
          radial-gradient(ellipse 95% 75% at 50% 58%, rgba(255, 248, 235, 0.32), transparent 65%);
        opacity: 0;
        pointer-events: none;
        z-index: 4;
        mix-blend-mode: soft-light;
      }

      .room-dim {
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(40, 55, 75, 0.22), rgba(30, 42, 58, 0.3));
        opacity: 1;
        pointer-events: none;
        z-index: 4;
      }

      .sofa {
        position: absolute;
        left: 8%;
        bottom: 14%;
        width: 420px;
        height: 160px;
        z-index: 2;
      }

      .sofa-body {
        position: absolute;
        inset: 40px 0 0;
        background: linear-gradient(180deg, #8e9eaf, #6d7d8f);
        border-radius: 28px 28px 18px 18px;
        box-shadow: 0 16px 28px rgba(35, 50, 70, 0.28);
      }

      .sofa-back {
        position: absolute;
        top: 0;
        left: 24px;
        right: 24px;
        height: 70px;
        background: linear-gradient(180deg, #9aabbb, #7d8d9e);
        border-radius: 22px 22px 8px 8px;
      }

      .sofa-arm {
        position: absolute;
        bottom: 0;
        width: 48px;
        height: 110px;
        background: linear-gradient(180deg, #8fa0b0, #687888);
        border-radius: 16px;
      }
      .sofa-arm-l {
        left: 0;
      }
      .sofa-arm-r {
        right: 0;
      }

      .table {
        position: absolute;
        left: 42%;
        bottom: 18%;
        width: 150px;
        height: 70px;
        z-index: 2;
      }

      .table-top {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 14px;
        background: linear-gradient(180deg, #c5cfd9, #9eabba);
        border-radius: 8px;
      }

      .table-leg {
        position: absolute;
        top: 14px;
        width: 8px;
        height: 56px;
        background: #8a97a6;
        border-radius: 4px;
      }
      .table-leg-l {
        left: 18px;
      }
      .table-leg-r {
        right: 18px;
      }

      /* Chat overlay */
      .chat-layer {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        top: 52%;
        z-index: 10;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 0 64px 90px;
        gap: 22px;
        background: linear-gradient(180deg, transparent 0%, rgba(232, 237, 242, 0.55) 28%, rgba(232, 237, 242, 0.92) 100%);
      }

      .bubble {
        max-width: 78%;
        padding: 22px 28px;
        border-radius: 28px;
        font-size: 34px;
        font-weight: 500;
        line-height: 1.3;
        letter-spacing: -0.01em;
        box-shadow: 0 14px 36px rgba(40, 55, 75, 0.12);
        opacity: 0;
      }

      .bubble-me {
        align-self: flex-end;
        background: #f7f9fb;
        color: #243041;
        border-bottom-right-radius: 10px;
        border: 1px solid rgba(180, 195, 210, 0.45);
      }

      .bubble-them {
        align-self: flex-start;
        background: #d7e0ea;
        color: #1f2a38;
        border-bottom-left-radius: 10px;
        border: 1px solid rgba(150, 170, 190, 0.35);
      }

      .check {
        display: inline-block;
        margin-left: 6px;
        color: #4a6a88;
        font-weight: 600;
      }

      .grain {
        position: absolute;
        inset: 0;
        z-index: 20;
        pointer-events: none;
        opacity: 0.05;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        mix-blend-mode: multiply;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="10"
      data-width="1080"
      data-height="1350"
    >
      <section id="scene" class="clip scene" data-start="0" data-duration="10" data-track-index="1">
        <div class="room-fill" aria-hidden="true"></div>
        <div class="wall-texture" aria-hidden="true"></div>
        <div class="floor" aria-hidden="true"></div>
        <div class="floor-sheen" aria-hidden="true"></div>

        <div class="curtain curtain-l" aria-hidden="true"></div>
        <div class="window" aria-hidden="true">
          <div class="window-pane">
            <span></span><span></span><span></span><span></span>
          </div>
        </div>
        <div class="curtain curtain-r" aria-hidden="true"></div>

        <div class="sofa" aria-hidden="true">
          <div class="sofa-back"></div>
          <div class="sofa-body"></div>
          <div class="sofa-arm sofa-arm-l"></div>
          <div class="sofa-arm sofa-arm-r"></div>
        </div>

        <div class="table" aria-hidden="true">
          <div class="table-top"></div>
          <div class="table-leg table-leg-l"></div>
          <div class="table-leg table-leg-r"></div>
        </div>

        <div class="lamp" aria-hidden="true">
          <div id="lamp-glow" class="lamp-glow"></div>
          <div class="lamp-shade-inner"></div>
          <div class="lamp-shade"></div>
          <div id="lamp-shade-lit" class="lamp-shade-lit"></div>
          <div class="lamp-stem"></div>
          <div class="lamp-base"></div>
        </div>

        <div id="room-dim" class="room-dim" aria-hidden="true"></div>
        <div id="room-light" class="room-light" aria-hidden="true"></div>

        <div class="chat-layer">
          <div id="bubble-me" class="bubble bubble-me">Turn the lights on</div>
          <div id="bubble-them" class="bubble bubble-them">
            Done <span class="check">✓</span>
          </div>
        </div>

        <div class="grain" aria-hidden="true"></div>
      </section>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Soft ambient breath on window light (finite, seek-safe)
      tl.to(
        ".window",
        { opacity: 0.88, duration: 2.4, ease: "sine.inOut", yoyo: true, repeat: 3 },
        0,
      );

      // User bubble in
      tl.fromTo(
        "#bubble-me",
        { autoAlpha: 0, y: 28, scale: 0.96 },
        { autoAlpha: 1, y: 0, scale: 1, duration: 0.65, ease: "power3.out" },
        0.7,
      );

      // Reply lands
      tl.fromTo(
        "#bubble-them",
        { autoAlpha: 0, y: 24, scale: 0.96 },
        { autoAlpha: 1, y: 0, scale: 1, duration: 0.55, ease: "power3.out" },
        2.6,
      );

      // Lights on as reply lands — lamp glow + soft room fill
      tl.to("#lamp-glow", { opacity: 1, duration: 1.4, ease: "power2.out" }, 2.75);
      tl.to("#room-light", { opacity: 1, duration: 1.6, ease: "power2.out" }, 2.8);
      tl.to("#room-dim", { opacity: 0.12, duration: 1.6, ease: "power2.out" }, 2.8);
      tl.to("#lamp-shade-lit", { opacity: 1, duration: 1.2, ease: "power2.out" }, 2.85);
      tl.to(".floor-sheen", { opacity: 0.7, duration: 1.4, ease: "power2.out" }, 2.9);

      // Settle
      tl.to({}, { duration: 2.2 }, 5.0);

      // Loop-friendly settle back toward start
      tl.to("#bubble-me", { autoAlpha: 0, y: -10, duration: 0.7, ease: "power2.in" }, 8.2);
      tl.to("#bubble-them", { autoAlpha: 0, y: -10, duration: 0.7, ease: "power2.in" }, 8.35);
      tl.to("#lamp-glow", { opacity: 0, duration: 1.1, ease: "power2.inOut" }, 8.5);
      tl.to("#room-light", { opacity: 0, duration: 1.1, ease: "power2.inOut" }, 8.5);
      tl.to("#room-dim", { opacity: 1, duration: 1.1, ease: "power2.inOut" }, 8.5);
      tl.to("#lamp-shade-lit", { opacity: 0, duration: 1.0, ease: "power2.inOut" }, 8.55);
      tl.to(".floor-sheen", { opacity: 0.35, duration: 1.0, ease: "power2.inOut" }, 8.55);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
